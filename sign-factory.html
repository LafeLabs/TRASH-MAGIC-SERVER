function drawfeed(){
       document.getElementById("signfeed").innerHTML = "";
//       for(var signindex = signfeed.length - 1;signindex >= 0;signindex--){
       for(var signindex = 0;signindex < signfeed.length;signindex++){
           var newdiv = document.createElement("DIV");//sign box
           newdiv.className = "signbox";
           var newa = document.createElement("A");
           newa.innerHTML = signfeed[signindex].name;
           newa.href = signfeed[signindex].link;
           var newp = document.createElement("P");
           newp.innerHTML = signfeed[signindex].message;
           var newcan = document.createElement("CANVAS");

            var new_qrcode = document.createElement("SPAN");
        
            qrcode = new QRCode(new_qrcode, {
            	text: signfeed[signindex].link,
            	width: 160,
            	height: 160,
            	colorDark : "#000000",
            	colorLight : "#ffffff",
            	correctLevel : QRCode.CorrectLevel.H
            });
            
            newdiv.appendChild(newa);
            newdiv.appendChild(new_qrcode);
            newdiv.appendChild(newp);
            newdiv.appendChild(newcan);
            document.getElementById("signfeed").appendChild(newdiv);
           ctx = newcan.getContext("2d");
           squaresize = 400;
            newcan.width = squaresize;//px
            newcan.height = squaresize;//px
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            for(var strokeindex = 0;strokeindex < signfeed[signindex].brushstrokes.length;strokeindex++){
                ctx.lineWidth = Math.round(0.01*squaresize*signfeed[signindex].brushstrokes[strokeindex].strokewidth);
                ctx.strokeStyle = signfeed[signindex].brushstrokes[strokeindex].color;
                ctx.beginPath(); // Start a new path
            
                ctx.moveTo(0.01*squaresize*signfeed[signindex].brushstrokes[strokeindex].points[0].x,0.01*squaresize*signfeed[signindex].brushstrokes[strokeindex].points[0].y); // Move the pen to (30, 50)
                for(var pointindex = 1;pointindex < signfeed[signindex].brushstrokes[strokeindex].points.length;pointindex++){
    
                    ctx.lineTo(0.01*squaresize*signfeed[signindex].brushstrokes[strokeindex].points[pointindex].x,0.01*squaresize*signfeed[signindex].brushstrokes[strokeindex].points[pointindex].y); // Draw a line to (150, 100)    
                }
                ctx.stroke(); // Render the path
                
            }
           
       }
       
}

function draw() {
  
  if(mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height){

            brushstroke.points.push(point);
        }
        line(mouseX, mouseY, pmouseX, pmouseY);
        inLine = true;
        if(mouseX != pmouseX || mouseY != pmouseY){
            var  point = {};
            point.x = (100*mouseX/width).toFixed(1);
            point.y = (100*mouseY/width).toFixed(1);
            brushstroke.points.push(point);
        }

          }

      }

}


document.getElementById("deletebutton").onclick = function(){

    //background(159,135,103);
    for(var strokeindex = 0;strokeindex < sign.brushstrokes.length;strokeindex++){
        for(var pointindex = 1;pointindex < sign.brushstrokes[strokeindex].points.length;pointindex++){
            
            stroke(sign.brushstrokes[strokeindex].color);
            strokeWeight(Math.round(0.01*width*sign.brushstrokes[strokeindex].strokewidth));
            line(0.01*width*sign.brushstrokes[strokeindex].points[pointindex - 1].x,0.01*width*sign.brushstrokes[strokeindex].points[pointindex - 1].y,0.01*width*sign.brushstrokes[strokeindex].points[pointindex].x,0.01*width*sign.brushstrokes[strokeindex].points[pointindex].y);

    }
}
